<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocoMind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-container" class="hidden">

        <!-- Header -->
        <div id="chat-header">
            <div class="header-left">
                <div class="npc-avatar">
                    <span id="npc-initial">T</span>
                    <div class="avatar-ring"></div>
                </div>
                <div class="npc-info">
                    <div id="npc-name">Tommy</div>
                    <div class="npc-status">
                        <span class="status-dot"></span>
                        <span class="status-text">Available</span>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="locomind-badge">
                    <span>⬡</span> LocoMind
                </div>
                <button id="close-btn" onclick="closeChat()">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div id="chat-messages"></div>

        <!-- Input -->
        <div id="chat-input-row">
            <input
                type="text"
                id="chat-input"
                placeholder="Talk to the NPC..."
                maxlength="200"
                autocomplete="off"
            />
            <button id="send-btn" onclick="sendMessage()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 8L14 2L8 14L7 9L2 8Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Footer -->
        <div id="chat-footer">
            <span class="footer-hint">Press <kbd>Enter</kbd> to send · <kbd>Esc</kbd> to close</span>
        </div>
    </div>

    <audio id="npc-voice" style="display:none;"></audio>
    <script src="script.js"></script>
</body>
</html>
