<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocoMind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-container" class="hidden">
        <div id="chat-header">
            <span id="npc-name">NPC</span>
            <button id="close-btn" onclick="closeChat()">✕</button>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-row">
            <input type="text" id="chat-input" placeholder="Say something..." maxlength="200" autocomplete="off" />
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
        <div id="chat-footer">
            <span>LocoMind Free · <a href="https://locomind.dev" target="_blank">locomind.dev</a></span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
